
name: Postman Collection Workflow

on:
  push:
    branches:
      - main

  workflow_dispatch:
  schedule:
    - cron: '30 02 * * *' # 8:00 AM IST Everyday
    - cron: '00 14 * * *' # 7:30 PM IST Everyday
    - cron: '00 06 * * 1-5' # 11:30 AM IST Monday-Friday

jobs:
  run-postman-tests:
    runs-on: self-hosted

    steps:
      - name: Checkout the Code
        uses: actions/checkout@v4

      - name: Install Node js and npm
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Newman and Html-extra globally
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra

      - name: Run Postman Collection with Newman
        run: |
          newman run 'Inwarranty-flow-Collection-Corrected.postman_collection.json' \
          -e QA.postman_environment.json \
          -d testData.csv \
          -r cli,htmlextra \
          --reporter-htmlextra-export ./newman/index.html

      - name: Newman Report
        if: always() # ensure that archive section executed irrespective whether previous step has passed or not
        uses: actions/upload-artifact@v7.0.1
        with:
          name: Newman Report
          path: newman/*.html

      - name: Creating github page branch
        if: always()
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: newman/

      - name:  Send email notifications
        if: always()
        uses: dawidd6/action-send-mail@v17
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Phoenix Inwarranty Flow Test Execution Report
          to: mounikaagiru@gmail.com
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
                Hi,
                Postman In warranty Flow tests have been executed.The report has been published and the URL 
                is : https://magiru23.github.io/Phoenix-Inwarranty-Flow/

                
          

