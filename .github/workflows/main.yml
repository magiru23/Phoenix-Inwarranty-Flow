       name : Postman Collection Workflow
       

       
       on :
         push:
            branches:
                 -main
         workflow_dispatch :
         schedule :
         - cron : 30 02  * * *  # 8:AM IST Everyday
         - cron : 00 14  * * *  # 2:30 AM IST Everyday
         - cron : 00 06  * * 1-5 # 11:30 am IST Monday-Friday

         

      
       jobs : 
        run-postman-tests:
          runs-on : ubuntu-latest

          steps:
          
            - name: Checkout the Code
             uses: actions/checkout@v6.0.2
             
             - name: Install Node js and npm
              uses: actions/setup-node@v6.4.0
              
              with:
                node-version : '26'

              - name: Install Newman and Html-extra globally
               run : |
                     npm install -g  newman
                     npm install -g newman-reporter-htmlextra

              - name: Run Postman Collection with Newman
               run : |
                     newman run 'Inwarranty-flow-Collection-Corrected.postman_collection.json' \
                     -e QA.postman_environment.json \
                     -d testData.csv \
                     -r cli,htmlextra
              
               


               

            
          
        
         
       
            
       

       
       
       


